name: Publish Helm Chart (OCI)

on:
  push:
    paths:
      - 'deployments/store-app/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CHART_REGISTRY: ${{ secrets.CHART_REGISTRY }}
      CHART_USERNAME: ${{ secrets.CHART_USERNAME }}
      CHART_PASSWORD: ${{ secrets.CHART_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Log in to OCI registry
        if: env.CHART_REGISTRY != '' && env.CHART_USERNAME != '' && env.CHART_PASSWORD != ''
        run: |
          echo "${{ env.CHART_PASSWORD }}" | helm registry login -u "${{ env.CHART_USERNAME }}" --password-stdin "${{ env.CHART_REGISTRY }}"

      - name: Package and push chart
        run: |
          helm package deployments/store-app
          helm push store-app-*.tgz oci://${{ env.CHART_REGISTRY }}/charts
