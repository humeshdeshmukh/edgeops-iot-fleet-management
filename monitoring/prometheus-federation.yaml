global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'prometheus-federate'
    metrics_path: /federate
    params:
      match[]: ['{__name__=~"job:.*|up|process_.*"}']
    static_configs:
      - targets: ['central-prometheus.example.com:9090']

remote_write:
  - url: "https://central-prometheus.example.com/api/v1/write"
    queue_config:
      capacity: 2500
      max_shards: 200
      min_shards: 1
      max_samples_per_send: 100
      batch_send_deadline: 5s
    tls_config:
      insecure_skip_verify: false
      ca_file: /etc/prometheus/certs/ca.crt
    bearer_token_file: /etc/prometheus/secrets/remote_write_token
    # In production, populate the certificate files via a secure mechanism (Ansible Vault or CSI Secrets)

# Notes:
# - Use `remote_write` to forward metrics when connectivity permits.
# - Use a write-ahead queue or file-based storage (Prometheus remote_write buffering) for offline resiliency.
