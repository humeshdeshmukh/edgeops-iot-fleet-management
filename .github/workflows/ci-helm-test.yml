name: "CI: Helm Test"

on:
  pull_request:
    paths:
      - 'deployments/store-app/**'

jobs:
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint deployments/store-app

      - name: Helm template (render)
        run: helm template tests deployments/store-app --values deployments/store-app/values.yaml
