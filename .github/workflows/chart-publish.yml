name: Publish Helm Chart (OCI)

on:
  push:
    paths:
      - 'deployments/store-app/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Log in to OCI registry
        if: secrets.CHOART_REGISTRY != ''
        run: |
          echo ${{ secrets.CHOART_PASSWORD }} | helm registry login -u ${{ secrets.CHOART_USERNAME }} --password-stdin ${{ secrets.CHOART_REGISTRY }}

      - name: Package and push chart
        run: |
          helm package deployments/store-app
          helm push store-app-*.tgz oci://${{ secrets.CHOART_REGISTRY }}/charts
